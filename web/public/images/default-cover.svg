<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6d28d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.02" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative circles -->
  <circle cx="1050" cy="100" r="280" fill="url(#circle1)" />
  <circle cx="150" cy="530" r="200" fill="url(#circle1)" />

  <!-- Document icon (centered) -->
  <g transform="translate(520, 215)">
    <!-- Page body -->
    <rect x="0" y="0" width="160" height="200" rx="12" fill="white" fill-opacity="0.15" />
    <!-- Folded corner -->
    <polygon points="120,0 160,40 120,40" fill="white" fill-opacity="0.25" />
    <line x1="120" y1="0" x2="120" y2="40" stroke="white" stroke-opacity="0.4" stroke-width="1.5"/>
    <line x1="120" y1="40" x2="160" y2="40" stroke="white" stroke-opacity="0.4" stroke-width="1.5"/>
    <!-- Lines -->
    <rect x="24" y="70"  width="112" height="10" rx="5" fill="white" fill-opacity="0.5" />
    <rect x="24" y="94"  width="90"  height="10" rx="5" fill="white" fill-opacity="0.35" />
    <rect x="24" y="118" width="112" height="10" rx="5" fill="white" fill-opacity="0.35" />
    <rect x="24" y="142" width="70"  height="10" rx="5" fill="white" fill-opacity="0.25" />
  </g>
</svg>
